<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EProhori - Threat Detector</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
      min-height: 100vh;
    }

    .container {
      width: 400px;
      padding: 20px;
      background: white;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    }

    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 2px solid #667eea;
    }

    .header h1 {
      font-size: 24px;
      color: #667eea;
      margin-bottom: 5px;
    }

    .header p {
      font-size: 12px;
      color: #666;
    }

    .section {
      margin-bottom: 20px;
    }

    .section h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #333;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
    }

    select {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
    }

    .btn {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    .btn-primary {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      margin-top: 10px;
    }

    .btn-secondary:hover {
      background: #e0e0e0;
    }

    .result-card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .result-item {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    .result-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .result-item strong {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-phishing {
      background: #ffe0e0;
      color: #d32f2f;
    }

    .badge-scam {
      background: #fff3e0;
      color: #f57c00;
    }

    .badge-fraud {
      background: #f3e5f5;
      color: #6a1b9a;
    }

    .badge-malware {
      background: #e0f2f1;
      color: #00695c;
    }

    .badge-high {
      background: #ffebee;
      color: #c62828;
    }

    .badge-medium {
      background: #fff8e1;
      color: #f57f17;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .stat-box {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }

    .stat-box p {
      font-size: 11px;
      color: #666;
      margin-bottom: 5px;
    }

    .stat-box strong {
      font-size: 18px;
      color: #667eea;
    }

    .hidden {
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #999;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }

    .description {
      font-size: 12px;
      line-height: 1.5;
      color: #555;
    }

    ol, ul {
      margin-left: 20px;
      font-size: 12px;
      color: #555;
    }

    li {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🛡️ EProhori</h1>
      <p>Real-time Threat Detection</p>
    </div>

    <div class="section">
      <h2>📝 Analyze Threat</h2>
      <textarea id="messageInput" placeholder="Paste suspicious message, URL, or email here..."></textarea>
      <select id="languageSelect">
        <option value="en">English</option>
        <option value="bn">বাংলা (Bengali)</option>
      </select>
      <button id="analyzeBtn" class="btn btn-primary">🔍 Analyze Now</button>
    </div>

    <div id="resultsSection" class="section hidden">
      <h2>📊 Threat Analysis</h2>
      <div class="result-card">
        <div class="result-item">
          <strong>Threat Type:</strong>
          <span id="threatType" class="badge">-</span>
        </div>
        <div class="result-item">
          <strong>Severity:</strong>
          <span id="severity" class="badge">-</span>
        </div>
        <div class="result-item">
          <strong>Risk Level:</strong>
          <div id="riskLevel" style="width: 100%; height: 6px; background: #eee; border-radius: 3px; margin-top: 5px;">
            <div id="riskBar" style="height: 100%; border-radius: 3px; background: #667eea; width: 0%;"></div>
          </div>
          <span id="riskPercent" style="font-size: 11px; color: #666;">0%</span>
        </div>
        <div class="result-item">
          <strong>Description:</strong>
          <p id="description" class="description">-</p>
        </div>
        <div class="result-item" id="stepsSection" style="display: none;">
          <strong>What to do:</strong>
          <ol id="solutionSteps"></ol>
        </div>
        <div class="result-item" id="tipsSection" style="display: none;">
          <strong>Prevention Tips:</strong>
          <ul id="preventionTips"></ul>
        </div>
      </div>
      <button id="reportBtn" class="btn btn-secondary">📢 Report This Threat</button>
    </div>

    <div class="stats">
      <div class="stat-box">
        <p>Threats Detected</p>
        <strong id="statThreats">-</strong>
      </div>
      <div class="stat-box">
        <p>Users Protected</p>
        <strong id="statUsers">-</strong>
      </div>
    </div>

    <div class="footer">
      <p>🇧🇩 Protecting Bangladesh Online</p>
      <a href="https://eprohori.tech" target="_blank">Visit EProhori</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
