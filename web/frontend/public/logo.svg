<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" fill="none">
  <defs>
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#5a3d7f"/>
    </linearGradient>
  </defs>

  <!-- Shield background with cyan border -->
  <path d="M 40 10 L 15 24 L 15 44 C 15 68 40 78 40 78 C 40 78 65 68 65 44 L 65 24 Z"
        fill="url(#shieldGrad)" stroke="#00ffcc" stroke-width="1"/>

  <!-- Inner shield -->
  <path d="M 40 16 L 24 28 L 24 44 C 24 63 40 72 40 72 C 40 72 56 63 56 44 L 56 28 Z"
        fill="url(#innerGrad)"/>

  <!-- Center accent circle -->
  <circle cx="40" cy="38" r="4.5" fill="#00ffcc" opacity="0.9"/>

  <!-- E letter in shield -->
  <text x="40" y="54" font-size="20" font-weight="bold" fill="#00ffcc" text-anchor="middle"
        font-family="Arial, sans-serif">E</text>

  <!-- EProhori text -->
  <text x="85" y="38" font-size="28" font-weight="700" fill="#00ffcc"
        font-family="Arial, sans-serif" letter-spacing="0.5">EProhori</text>

  <!-- Subtitle -->
  <text x="85" y="55" font-size="10" font-weight="500" fill="#a0a8c8"
        font-family="Arial, sans-serif" letter-spacing="0.3">THREAT DETECTOR</text>
</svg>
