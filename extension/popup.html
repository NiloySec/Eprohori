<!DOCTYPE html>
<html lang="bn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EProhori - হুমকি সনাক্তকারী</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Roboto, 'Noto Sans Bengali', sans-serif;
      background: linear-gradient(135deg, #1a0a1f 0%, #2d1b3d 100%);
      color: #fff;
      min-height: 100vh;
    }

    .container {
      width: 450px;
      padding: 30px 20px;
      background: linear-gradient(135deg, #2d1b3d 0%, #1a0a1f 100%);
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-bottom: 20px;
    }

    .logo-section {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 15px;
    }

    .logo {
      width: 50px;
      height: 50px;
      margin-right: 10px;
    }

    .header h1 {
      font-size: 28px;
      color: #00ffcc;
      margin: 0;
      font-weight: 700;
    }

    .header p {
      font-size: 13px;
      color: #aaa;
      margin-top: 5px;
    }

    .warning-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #ff5555 0%, #ff3333 100%);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto 20px;
      box-shadow: 0 10px 30px rgba(255, 51, 51, 0.3);
    }

    .threat-title {
      text-align: center;
      margin-bottom: 20px;
    }

    .threat-title h2 {
      font-size: 32px;
      color: #ff5555;
      margin-bottom: 10px;
      font-weight: 700;
    }

    .threat-title p {
      font-size: 14px;
      color: #ddd;
      line-height: 1.6;
    }

    .section {
      margin-bottom: 20px;
    }

    .section h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #00ffcc;
    }

    textarea {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      font-family: inherit;
      resize: vertical;
    }

    select {
      width: 100%;
      padding: 8px;
      margin: 10px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      display: inline-block;
    }

    .btn-container {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .btn-primary {
      flex: 1;
      background: linear-gradient(135deg, #00ffcc 0%, #00dd99 100%);
      color: #000;
      font-weight: 700;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(0, 255, 204, 0.4);
    }

    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-secondary {
      flex: 1;
      background: linear-gradient(135deg, #ff5555 0%, #ff3333 100%);
      color: white;
      font-weight: 700;
    }

    .btn-secondary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(255, 51, 51, 0.4);
    }

    .result-card {
      background: #f9f9f9;
      padding: 15px;
      border-radius: 8px;
      border-left: 4px solid #667eea;
    }

    .result-item {
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 1px solid #eee;
    }

    .result-item:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .result-item strong {
      display: block;
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .badge-phishing {
      background: #ffe0e0;
      color: #d32f2f;
    }

    .badge-scam {
      background: #fff3e0;
      color: #f57c00;
    }

    .badge-fraud {
      background: #f3e5f5;
      color: #6a1b9a;
    }

    .badge-malware {
      background: #e0f2f1;
      color: #00695c;
    }

    .badge-high {
      background: #ffebee;
      color: #c62828;
    }

    .badge-medium {
      background: #fff8e1;
      color: #f57f17;
    }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 15px;
    }

    .stat-box {
      background: #f0f0f0;
      padding: 10px;
      border-radius: 6px;
      text-align: center;
    }

    .stat-box p {
      font-size: 11px;
      color: #666;
      margin-bottom: 5px;
    }

    .stat-box strong {
      font-size: 18px;
      color: #667eea;
    }

    .hidden {
      display: none;
    }

    .footer {
      text-align: center;
      margin-top: 15px;
      padding-top: 15px;
      border-top: 1px solid #eee;
      font-size: 11px;
      color: #999;
    }

    .footer a {
      color: #667eea;
      text-decoration: none;
    }

    .description {
      font-size: 12px;
      line-height: 1.5;
      color: #555;
    }

    ol, ul {
      margin-left: 20px;
      font-size: 12px;
      color: #555;
    }

    li {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Initial Analysis View -->
    <div id="analysisView" class="hidden">
      <div class="header">
        <div class="logo-section">
          <div style="font-size: 40px;">🛡️</div>
          <h1>EProhori</h1>
        </div>
      </div>

      <div class="section" style="margin-top: 30px;">
        <h2>হুমকি বিশ্লেষণ করুন</h2>
        <textarea id="messageInput" placeholder="সন্দেহজনক বার্তা, URL বা ইমেইল এখানে পেস্ট করুন..." style="color: #fff;"></textarea>
        <select id="languageSelect" style="color: #fff;">
          <option value="en">English</option>
          <option value="bn">বাংলা (Bengali)</option>
        </select>
        <button id="analyzeBtn" class="btn btn-primary" style="width: 100%; margin-top: 15px;">🔍 এখনই বিশ্লেষণ করুন</button>
      </div>
    </div>

    <!-- Results View -->
    <div id="resultsSection" class="hidden">
      <div class="warning-icon">⚠️</div>

      <div class="threat-title">
        <h2 id="threatTypeDisplay">সতর্কতা</h2>
        <p id="threatDescription">এই লিঙ্ক সন্দেহজনক/ফিশিং (85% নিশ্চিত)</p>
      </div>

      <div class="section" style="background: rgba(255, 51, 51, 0.1); padding: 15px; border-radius: 12px; border-left: 4px solid #ff5555;">
        <p style="font-size: 13px; color: #ddd; margin-bottom: 10px;">সন্দেহজনক প্রেরণাধীন:</p>
        <div style="background: rgba(0, 0, 0, 0.3); padding: 10px; border-radius: 8px; border-left: 3px solid #00ffcc;">
          <code id="suspiciousUrl" style="color: #00ffcc; font-size: 12px; word-break: break-all;">http://example.com/verify</code>
        </div>
      </div>

      <div class="section">
        <p style="font-size: 13px; color: #ddd; margin-bottom: 10px;">⚠️ পাসওয়ার্ড, OTP বা ব্যাংকিং তথ্য দেবেন না।</p>
      </div>

      <div class="section" id="stepsSection" style="display: none;">
        <h2>কী করবেন:</h2>
        <ol id="solutionSteps" style="color: #ddd;"></ol>
      </div>

      <div class="section" id="tipsSection" style="display: none;">
        <h2>প্রতিরোধ পরামর্শ:</h2>
        <ul id="preventionTips" style="color: #ddd;"></ul>
      </div>

      <div class="btn-container">
        <button id="backBtn" class="btn btn-primary">← নিরাপদে ফিরে যান</button>
        <button id="reportBtn" class="btn btn-secondary">☀️ রিপোর্ট করুন</button>
      </div>
    </div>

    <div class="footer">
      <p style="font-size: 12px; color: #999;">🇧🇩 বাংলাদেশকে রক্ষা করছি</p>
      <a href="https://eprohori.tech" target="_blank" style="color: #00ffcc; font-size: 12px;">EProhori পরিদর্শন করুন →</a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
