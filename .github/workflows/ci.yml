name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web/frontend/package-lock.json
      - run: npm ci
      - run: npm run lint --if-present
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: https://eprohori-production.up.railway.app

  mobile:
    name: Mobile (Expo/React Native)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile-app/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Unit tests
        run: npm test -- --ci

  backend:
    name: Backend (FastAPI)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: web/backend/requirements.txt
      - run: pip install -r requirements.txt
      - name: Syntax check
        run: python -m py_compile $(find . -maxdepth 2 -name "*.py" -not -path "./venv/*")
      - name: Import smoke test
        run: python -c "import main; print('OK')"
        env:
          JWT_SECRET: test-secret-for-ci-only-not-real
          ENV: development
      - name: Run pytest
        run: python -m pytest -q
        env:
          JWT_SECRET: test-secret-for-ci-only-not-real
          ENV: development
